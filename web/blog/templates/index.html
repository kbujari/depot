{% extends "base.html" %}

{% block content %}

<head>

</head>

<h2>{{ section.title }}: {{ section.description }}</h2>
{% for page in section.pages %}

    <li>
    <span>[{{ page.date }}]</span>
    <a href="{{ page.permalink | safe }}">{{ page.title }}</a>
    </li>
  </ul>
{% endfor %}

{% endblock content %}
